<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HostProof – Legal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F0FDFA;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(13,148,136,0.12);
      text-align: center;
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .shield {
      width: 28px;
      height: 28px;
      color: #0D9488;
    }
    .wordmark { font-size: 28px; letter-spacing: -0.5px; }
    .wordmark strong { color: #0D9488; font-weight: 800; }
    .wordmark span   { color: #94a3b8; font-weight: 300; }
    .tagline {
      font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase;
      color: #94a3b8; margin-bottom: 40px;
    }
    h1 { font-size: 18px; color: #134E4A; margin-bottom: 8px; }
    p  { font-size: 14px; color: #6B7280; margin-bottom: 32px; line-height: 1.6; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .btn {
      display: block;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #0D9488; color: #fff; }
    .btn-outline {
      border: 2px solid #0D9488;
      color: #0D9488;
      background: transparent;
    }
    .email {
      margin-top: 32px;
      font-size: 13px;
      color: #9CA3AF;
    }
    .email a { color: #0D9488; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg class="shield" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
      </svg>
      <div class="wordmark"><strong>Host</strong><span>Proof</span></div>
    </div>
    <div class="tagline">Proof Every Stay</div>

    <h1>Legal Documents</h1>
    <p>Read our Terms of Service and Privacy Policy to understand how HostProof works and how we protect your data.</p>

    <div class="links">
      <a class="btn btn-primary" href="terms.html">Terms of Service</a>
      <a class="btn btn-outline" href="privacy.html">Privacy Policy</a>
    </div>

    <div class="email">
      Questions? <a href="mailto:hostproof.support.in@gmail.com">hostproof.support.in@gmail.com</a>
    </div>
  </div>
</body>
</html>
